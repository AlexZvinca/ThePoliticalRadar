name: Build and deploy Node.js app to Azure Web App - PoliticalRadarFrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: "https://thepoliticalradar-b0h2b0d7c6ddabam.francecentral-01.azurewebsites.net"
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r frontend/dist/* deploy/
          cat > deploy/server.js <<'EOF'
          const http = require("http");
          const fs = require("fs");
          const path = require("path");

          const root = __dirname;
          const port = process.env.PORT || 8080;

          const types = {
            ".html": "text/html",
            ".js": "text/javascript",
            ".css": "text/css",
            ".json": "application/json",
            ".png": "image/png",
            ".jpg": "image/jpeg",
            ".jpeg": "image/jpeg",
            ".svg": "image/svg+xml",
            ".ico": "image/x-icon"
          };

          http.createServer((req, res) => {
            const cleanUrl = decodeURI(req.url.split("?")[0]);
            let filePath = path.join(root, cleanUrl === "/" ? "index.html" : cleanUrl);

            if (!filePath.startsWith(root)) {
              res.writeHead(403);
              return res.end("Forbidden");
            }

            fs.readFile(filePath, (err, content) => {
              if (err) {
                fs.readFile(path.join(root, "index.html"), (fallbackErr, fallback) => {
                  if (fallbackErr) {
                    res.writeHead(500);
                    return res.end("Server error");
                  }
                  res.writeHead(200, { "Content-Type": "text/html" });
                  res.end(fallback);
                });
                return;
              }

              res.writeHead(200, {
                "Content-Type": types[path.extname(filePath)] || "application/octet-stream"
              });
              res.end(content);
            });
          }).listen(port, () => {
            console.log(`Frontend server listening on ${port}`);
          });
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_935EED9121104A8C9CBE05A713B135DA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1BABE34D9C6645B38D025F9FABD3E9B4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7DD52B28CE394E9393868316AD4CB06D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PoliticalRadarFrontend'
          slot-name: 'Production'
          package: .
