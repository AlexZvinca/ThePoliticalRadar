name: Build and deploy Python app to Azure Web App - ThePoliticalRadar

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate backend dependencies
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Package backend for deployment
        working-directory: backend
        run: |
          zip -r ../release.zip . -x "antenv/*" "__pycache__/*" "*.pyc" ".env"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F63AA0D4769541FAAC719BA7D883711E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D1FC328B60F34A9D8400DFE01D749294 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_428C6A3042014A41B81239739E0E36A1 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'ThePoliticalRadar'
          slot-name: 'Production'
          package: release.zip
